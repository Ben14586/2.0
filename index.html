    <title>Game Services - ระบบสั่งซื้อและติดตามออเดอร์ บริการเติมเกมมือถือครบวงจร</title>

    <script>

    <style>
      body {
        background:
          linear-gradient(135deg, rgba(250, 243, 238, 0.98), rgba(244, 236, 255, 0.98) 52%, rgba(255, 251, 245, 0.98)),
          radial-gradient(circle at 16% 12%, rgba(218, 182, 154, 0.18), transparent 28%),
          radial-gradient(circle at 82% 18%, rgba(178, 154, 214, 0.16), transparent 22%),
          radial-gradient(circle at 50% 94%, rgba(243, 208, 170, 0.22), transparent 28%),
          #faf3ee;
        color: #342d3b;
      }

      .page-shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 48px;
      }

      .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 36px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 900;
      }

      .brand-mark {
        display: inline-flex;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: linear-gradient(135deg, #8d6e63, #d8b7a0 52%, #f2dcc8);
        color: #241d29;
        box-shadow: 0 14px 30px rgba(141, 110, 99, 0.18), inset 0 0 16px rgba(255, 255, 255, 0.46);
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 18px;
        color: #6d6077;
        font-size: 14px;
      }

      .nav a {
        color: inherit;
        font-weight: 800;
        text-decoration: none;
        transition: color 0.18s ease, transform 0.18s ease;
      }

      .nav a:hover {
        color: #7c5d53;
        transform: translateY(-1px);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 24px;
        align-items: stretch;
      }

      .hero-copy {
        padding: 32px 36px 34px;
        position: relative;
        overflow: hidden;
      }

      .hero-copy::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, rgba(189, 159, 128, 0.18), transparent 42%, rgba(143, 117, 173, 0.10));
        pointer-events: none;
      }

      .hero-copy > * {
        position: relative;
      }

      .eyebrow {
        margin: 0 0 16px;
        color: #8d6e63;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(34px, 4.2vw, 54px);
        line-height: 1.18;
        letter-spacing: 0;
        background: linear-gradient(90deg, #5a4c62, #8f6f94 46%, #c39a84 78%, #7c6d58);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      h1 span,
      .hero-copy p span {
        display: block;
      }

      h1 .nowrap {
        white-space: nowrap;
      }

      .hero-copy p {
        max-width: 780px;
        color: var(--text-muted);
        font-size: 16px;
        line-height: 1.8;
        margin: 18px 0 0;
      }

      .search-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        margin-top: 22px;
      }

      .search-row input,
      .select-field,
      select,
      textarea {
        width: 100%;
        min-height: 46px;
        border: 1px solid rgba(141, 110, 99, 0.18);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.72);
        color: #342d3b;
        font-weight: 700;
        padding: 0 14px;
        outline: none;
        box-shadow: 0 10px 24px rgba(78, 58, 63, 0.06), inset 0 0 18px rgba(255, 255, 255, 0.55);
      }

      select option,
      .select-field option {
        background: #ffffff;
        color: #241d29;
        font-weight: 700;
      }

      textarea {
        min-height: 86px;
        padding: 12px 14px;
        resize: vertical;
      }

      .game-panel {
        padding: 24px;
      }

      .game-art,
      .game-thumb {
        display: grid;
        place-items: center;
        border-radius: 8px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(247, 234, 225, 0.78) 48%, rgba(242, 228, 246, 0.68)),
          rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(141, 110, 99, 0.18);
        box-shadow: inset 0 0 34px rgba(255, 255, 255, 0.32), 0 20px 30px rgba(106, 92, 104, 0.10);
        font-weight: 900;
      }

      .game-art {
        min-height: 220px;
        font-size: 64px;
      }

      .game-thumb {
        width: 64px;
        height: 64px;
        flex: 0 0 auto;
        font-size: 22px;
      }

      .section {
        margin-top: 24px;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
        margin-bottom: 14px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 24px;
      }

      .muted {
        color: var(--text-muted);
      }

      .category-row,
      .game-grid,
      .package-grid,
      .trust-grid {
        display: grid;
        gap: 14px;
      }

      .category-row {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .category {
        padding: 16px;
        text-align: center;
        font-weight: 800;
        color: #4d4255;
      }

      .game-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .game-card {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-height: 275px;
        padding: 18px;
      }

      .game-card__media {
        position: relative;
        overflow: hidden;
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(141, 110, 99, 0.15), rgba(143, 111, 148, 0.16));
        border: 1px solid rgba(141, 110, 99, 0.16);
        box-shadow: 0 18px 30px rgba(106, 92, 104, 0.11);
      }

      .game-card__media img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        transition: transform 0.28s ease;
      }

      .game-card:hover .game-card__media img {
        transform: scale(1.035);
      }

      .game-card__fallback {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        color: #5b4c62;
        font-size: 42px;
        font-weight: 900;
      }

      .game-card__top {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .game-card__top .game-thumb {
        width: 48px;
        height: 48px;
        font-size: 16px;
      }

      .game-card h3 {
        margin: 0 0 4px;
        line-height: 1.25;
      }

      .game-card p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.55;
      }

      .game-card > p {
        min-height: 72px;
      }

      .game-card__footer {
        display: grid;
        gap: 12px;
        margin-top: auto;
      }

      .package-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .package-card {
        padding: 18px;
        display: flex;
        flex-direction: column;
        min-height: 255px;
      }

      .package-card h3 {
        margin: 0;
        font-size: 18px;
      }

      .package-card p {
        color: #675d72;
        line-height: 1.55;
      }

      .package-card__header,
      .package-card__footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .package-card__footer {
        margin-top: auto;
        align-items: stretch;
        flex-direction: column;
      }

      .package-card.selected {
        border-color: rgba(141, 110, 99, 0.42);
        box-shadow: 0 14px 34px rgba(141, 110, 99, 0.14);
      }

      .package-card__items {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 6px;
        color: #675d72;
        line-height: 1.55;
      }

      .package-card__items li::marker {
        color: #9b7b65;
      }

      .package-card__meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 0;
      }

      .detail-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid rgba(141, 110, 99, 0.14);
        background: rgba(255, 255, 255, 0.7);
        color: #5e5169;
        font-size: 12px;
        font-weight: 700;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .detail-grid div {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(141, 110, 99, 0.12);
        color: #655973;
        font-size: 13px;
      }

      .public-package-section {
        margin-top: 24px;
      }

      .public-package-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .public-package-card {
        min-height: 340px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(250, 244, 238, 0.92)),
          rgba(255, 255, 255, 0.78);
        border-color: rgba(141, 110, 99, 0.16);
      }

      .public-package-card .price-text {
        font-size: 20px;
        color: #4d4255;
      }

      .public-package-card .package-card__footer {
        gap: 12px;
      }

      .creator-reference {
        margin-top: 24px;
      }

      .creator-layout {
        display: grid;
        grid-template-columns: minmax(260px, 0.55fr) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .creator-card {
        padding: 20px;
        display: grid;
        gap: 14px;
      }

      .creator-profile {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .creator-profile img {
        width: 76px;
        height: 76px;
        border-radius: 20px;
        object-fit: cover;
        border: 1px solid rgba(94, 81, 105, 0.16);
        background: rgba(255, 255, 255, 0.78);
      }

      .creator-actions,
      .clip-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .reference-thumb {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 10;
        object-fit: cover;
        border-radius: 12px;
        background: #ece6df;
      }

      .source-catalog {
        margin-top: 18px;
      }

      .reference-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .reference-card {
        padding: 14px;
        display: grid;
        gap: 10px;
        min-height: 320px;
      }

      .reference-card h3 {
        margin: 0;
        font-size: 15px;
        line-height: 1.35;
        color: #4d4255;
      }

      .reference-features {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .reference-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-self: end;
      }

      .service-section[hidden] {
        display: none;
      }

      .order-layout {
        display: grid;
        grid-template-columns: minmax(0, 0.8fr) minmax(320px, 0.55fr);
        gap: 18px;
      }

      .order-box {
        padding: 22px;
      }

      .order-success {
        display: grid;
        gap: 14px;
        padding: 22px;
        border: 1px solid rgba(141, 110, 99, 0.18);
        background: rgba(255, 255, 255, 0.9);
      }

      .order-success__id {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(216, 183, 160, 0.22);
        color: #4d4255;
        font-size: 18px;
        font-weight: 900;
      }

      .order-success__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .summary-line {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .message-preview {
        white-space: pre-wrap;
        color: var(--text-muted);
        line-height: 1.55;
        border: 1px solid rgba(141, 110, 99, 0.16);
        border-radius: 8px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.6);
      }

      .trust-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .trust-card {
        padding: 20px;
      }

      .section-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.74);
        border: 1px solid rgba(141, 110, 99, 0.12);
        color: #7b6270;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .hero-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .glass-card {
        backdrop-filter: blur(18px);
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(141, 110, 99, 0.12);
        box-shadow: 0 18px 44px rgba(89, 75, 88, 0.08);
        border-radius: 24px;
      }

      .risk-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 26px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .risk-pill.low {
        background: rgba(151, 184, 153, 0.18);
        color: #4f6c57;
      }

      .risk-pill.medium {
        background: rgba(195, 154, 132, 0.18);
        color: #8a614f;
      }

      .risk-pill.high {
        background: rgba(185, 117, 145, 0.18);
        color: #8a4c6a;
      }

      @media (max-width: 900px) {
        .hero,
        .order-layout,
        .game-grid,
        .package-grid,
        .trust-grid,
        .creator-layout,
        .reference-grid {
          grid-template-columns: 1fr;
        }

        .category-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .nav {
          display: none;
        }
      }

      @media (max-width: 560px) {
        .search-row {
          grid-template-columns: 1fr;
        }

        .category-row {
          grid-template-columns: 1fr;
        }

        .hero-copy,
        .game-panel,
        .order-box {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div id="react-upgrade-root"></div>
    <script type="module" src="/frontend/entry.tsx"></script>
  </body>
</html>
