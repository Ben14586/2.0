services:
  - type: web
    name: game-services
    runtime: docker
    plan: free
    healthCheckPath: /api/games
    disk:
      name: game-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DATABASE_FILE
        value: /app/data/database.db
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_API_BASE_URL
        value: https://game-services-hwcy.onrender.com
      - key: PUBLIC_SITE_URL
        value: https://game-services-hwcy.onrender.com
      - key: ADMIN_SITE_URL
        value: https://game-services-hwcy.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://game-services-hwcy.onrender.com

# Updated for Node.js Backend
