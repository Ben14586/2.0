services:
  - type: web
    name: game-services-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /health
    disk:
      name: game-services-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_FILE
        value: /var/data/database.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: ADMIN_SESSION_HOURS
        value: 8
      - key: COOKIE_SECURE
        value: 1
      - key: COOKIE_SAMESITE
        value: None
      - key: PUBLIC_SITE_URL
        value: https://store-game-0.netlify.app
      - key: ADMIN_SITE_URL
        value: https://store-game-0.netlify.app
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://store-game-0.netlify.app
