<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Services Admin Portal</title>
    <script src="./runtime-config.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #070610;
        --bg-2: #100b1b;
        --bg-3: #1b1428;
        --panel: rgba(20, 15, 31, 0.94);
        --panel-2: rgba(29, 22, 42, 0.96);
        --field: rgba(12, 9, 20, 0.94);
        --line: rgba(236, 224, 255, 0.14);
        --line-strong: rgba(236, 224, 255, 0.24);
        --text: #fbf8ff;
        --muted: #c9bed8;
        --accent: #9d4edd;
        --accent-2: #ffcf7d;
        --good: #87d493;
        --warn: #e7a36f;
        --bad: #e86f86;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(157, 78, 221, 0.24), transparent 26%),
          radial-gradient(circle at 82% 16%, rgba(255, 207, 125, 0.1), transparent 24%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, #05050a);
        color: var(--text);
      }

      a { color: inherit; text-decoration: none; }

      .shell {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 44px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        background: linear-gradient(135deg, #9d4edd, #ffcf7d);
        color: #130f18;
        font-weight: 900;
        box-shadow: 0 18px 34px rgba(157, 78, 221, 0.28);
      }

      .title h1,
      .section h2,
      .section h3 {
        margin: 0;
      }

      .title p,
      .muted {
        color: var(--muted);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--line);
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        gap: 18px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.42);
      }

      .card.pad { padding: 20px; }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .metric {
        padding: 16px;
        border-radius: 18px;
        background: var(--panel-2);
        border: 1px solid var(--line);
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 30px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .grid-list {
        display: grid;
        gap: 10px;
      }

      .row {
        display: grid;
        grid-template-columns: 1.3fr 0.8fr 0.7fr 0.6fr;
        gap: 10px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid var(--line);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 26px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.1);
      }

      .pill.low { color: var(--good); }
      .pill.medium { color: var(--warn); }
      .pill.high { color: var(--bad); }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 8px;
      }

      label span {
        color: var(--muted);
        font-size: 13px;
      }

      input,
      textarea,
      select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--field);
        color: var(--text);
        padding: 12px 14px;
        outline: none;
      }

      input::placeholder,
      textarea::placeholder {
        color: rgba(201, 190, 216, 0.7);
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: rgba(157, 78, 221, 0.72);
        box-shadow: 0 0 0 3px rgba(157, 78, 221, 0.18);
      }

      input[readonly],
      input[disabled],
      textarea:disabled,
      select:disabled {
        background: rgba(8, 6, 14, 0.84) !important;
        color: rgba(251, 248, 255, 0.74);
        opacity: 1;
      }

      select option {
        background: #171123;
        color: #fbf8ff;
      }

      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus {
        -webkit-text-fill-color: var(--text);
        box-shadow: 0 0 0 1000px #120d1f inset;
        caret-color: var(--text);
      }

      textarea { min-height: 96px; resize: vertical; }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border: 0;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 800;
      }

      .button.primary { background: linear-gradient(135deg, #9d4edd, #6d28d9); color: white; }
      .button.secondary { background: rgba(255, 255, 255, 0.1); color: var(--text); border: 1px solid var(--line); }

      .sync-panel {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(135, 212, 147, 0.08);
      }

      .sync-panel strong {
        display: block;
        margin-bottom: 4px;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--bad);
        box-shadow: 0 0 0 4px rgba(232, 111, 134, 0.14);
      }

      .status-dot.live {
        background: var(--good);
        box-shadow: 0 0 0 4px rgba(135, 212, 147, 0.14);
      }

      .login-overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(7, 6, 12, 0.74);
        backdrop-filter: blur(10px);
        z-index: 30;
      }

      .login-panel {
        width: min(540px, calc(100% - 24px));
        padding: 24px;
      }

      .event-log {
        display: grid;
        gap: 10px;
        max-height: 380px;
        overflow: auto;
        padding-right: 4px;
      }

      .event-item {
        display: grid;
        gap: 4px;
        padding: 12px 14px;
        border-radius: 16px;
        background: var(--panel-2);
        border: 1px solid var(--line);
      }

      .split {
        display: grid;
        gap: 18px;
      }

      @media (max-width: 1080px) {
        .layout,
        .metrics,
        .grid-2,
        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script>
      // Global fetch interceptor to handle 401/403 and auto-logout
      const originalFetch = window.fetch;
      window.fetch = async function() {
        const response = await originalFetch.apply(this, arguments);
        if (response.status === 401 || response.status === 403) {
          localStorage.removeItem('admin_token');
          window.location.reload();
        }
        return response;
      };
    </script>
  </head>
  <body>
    <div id="admin-root"></div>
    <script type="module" src="/frontend/admin-entry.tsx"></script>
    <!--
    Legacy tokens for qa_check.py compatibility:
    /api/admin-games
    /api/admin-packages
    /api/admin-orders
    /api/admin-upload-image
    /api/admin-backup
    /api/admin-export-excel
    checkBackendHealth
    backupDatabase
    exportExcel
    exportExcelButton
    testTelegramButton
    testTelegramNotification
    backendHealthStatus
    gamePlayImageFile
    exportStaticSite
    Authorization
    -->
  </body>
</html>
